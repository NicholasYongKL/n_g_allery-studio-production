<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nGallery — Visual Production Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --white: #ffffff; --off-white: #f7f5f1; --cream: #f0ece4; --cream-dark: #e8e2d8;
    --ink: #1a1917; --ink-mid: #4a4845; --ink-light: #8a8780; --ink-faint: #c4c1bc;
    --gold: #9a7832; --gold-mid: #b8914a; --gold-light: #c9a96e;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--white); color: var(--ink); font-family: var(--sans); font-size: 16px; line-height: 1.6; font-weight: 300; cursor: none; overflow-x: hidden; }

  .cursor { width: 8px; height: 8px; background: var(--gold-mid); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }
  .cursor-ring { width: 36px; height: 36px; border: 1px solid rgba(184,145,74,0.5); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9998; transition: width 0.2s, height 0.2s, border-color 0.2s; }
  .cursor-ring.hover { width: 56px; height: 56px; border-color: var(--gold-mid); }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 2rem 4rem; transition: background 0.4s, padding 0.3s, border-color 0.4s; border-bottom: 1px solid transparent; }
  nav.scrolled { background: rgba(255,255,255,0.96); backdrop-filter: blur(16px); padding: 1.2rem 4rem; border-bottom-color: var(--cream-dark); }
  .logo { font-family: var(--serif); font-size: 1.5rem; font-weight: 300; letter-spacing: 0.3em; color: #f0ede6; text-decoration: none; transition: color 0.4s; }
  .logo span { color: var(--gold-light); }
  nav.scrolled .logo { color: var(--ink); }
  nav.scrolled .logo span { color: var(--gold-mid); }
  .nav-links { display: flex; gap: 3rem; list-style: none; }
  .nav-links a { font-size: 0.75rem; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(240,237,230,0.7); text-decoration: none; transition: color 0.3s; }
  .nav-links a:hover { color: var(--gold-light); }
  nav.scrolled .nav-links a { color: var(--ink-light); }
  nav.scrolled .nav-links a:hover { color: var(--gold); }
  .nav-cta { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-light); text-decoration: none; border: 1px solid rgba(201,169,110,0.5); padding: 0.65rem 1.75rem; transition: all 0.3s; }
  .nav-cta:hover { background: var(--gold-mid); color: #fff; border-color: var(--gold-mid); }
  nav.scrolled .nav-cta { color: var(--gold); border-color: rgba(154,120,50,0.4); }
  nav.scrolled .nav-cta:hover { background: var(--gold); color: #fff; border-color: var(--gold); }

  .hero { height: 100vh; position: relative; display: flex; align-items: flex-end; padding: 0 4rem 6rem; overflow: hidden; background: #111; }
  .hero-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.30); z-index: 1; }
  .hero-video-bg { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
  .hero-video-bg video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .hero-content { position: relative; z-index: 2; max-width: 900px; }
  .hero-tag { display: inline-flex; align-items: center; gap: 0.75rem; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-light); margin-bottom: 2rem; }
  .hero-tag::before { content: ''; width: 40px; height: 1px; background: var(--gold-light); }
  .hero-title { font-family: var(--serif); font-size: clamp(3.5rem, 8vw, 7rem); font-weight: 300; line-height: 1.0; color: #f0ede6; margin-bottom: 1.5rem; }
  .hero-title em { font-style: italic; color: var(--gold-light); font-weight: 300; }
  .hero-sub { font-size: 0.95rem; font-weight: 300; color: rgba(160,158,153,0.9); line-height: 1.8; max-width: 480px; margin-bottom: 3rem; }
  .hero-actions { display: flex; align-items: center; gap: 2.5rem; }
  .btn-primary { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: #fff; background: var(--gold-mid); text-decoration: none; padding: 1rem 2.5rem; transition: all 0.3s; display: inline-block; }
  .btn-primary:hover { background: var(--gold); }
  .btn-ghost { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: #f0ede6; text-decoration: none; display: inline-flex; align-items: center; gap: 0.75rem; transition: color 0.3s; }
  .btn-ghost:hover { color: var(--gold-light); }
  .btn-ghost::after { content: '→'; font-size: 1rem; }
  .btn-ghost-dark { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-mid); text-decoration: none; display: inline-flex; align-items: center; gap: 0.75rem; transition: color 0.3s; }
  .btn-ghost-dark:hover { color: var(--gold); }
  .btn-ghost-dark::after { content: '→'; font-size: 1rem; }
  .hero-scroll { position: absolute; right: 4rem; bottom: 6rem; z-index: 2; writing-mode: vertical-rl; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(160,158,153,0.6); display: flex; align-items: center; gap: 1rem; }
  .hero-scroll::after { content: ''; width: 1px; height: 60px; background: rgba(160,158,153,0.4); animation: scrollLine 2s ease-in-out infinite; }
  @keyframes scrollLine { 0%, 100% { transform: scaleY(0); transform-origin: top; } 50% { transform: scaleY(1); transform-origin: top; } }

  .marquee-track { overflow: hidden; border-top: 1px solid var(--cream-dark); border-bottom: 1px solid var(--cream-dark); padding: 1.25rem 0; background: var(--off-white); }
  .marquee-inner { display: flex; white-space: nowrap; animation: marquee 30s linear infinite; }
  .marquee-item { font-family: var(--serif); font-size: 1.1rem; font-style: italic; color: var(--ink-faint); padding: 0 3rem; flex-shrink: 0; }
  .marquee-dot { color: var(--gold-mid); padding: 0 0.5rem; font-style: normal; }
  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  section { padding: 8rem 4rem; }
  .section-tag { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.75rem; }
  .section-tag::before { content: '—'; color: var(--gold); }
  .section-title { font-family: var(--serif); font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 300; line-height: 1.1; color: var(--ink); margin-bottom: 1.5rem; }
  .section-title em { font-style: italic; color: var(--gold-mid); }

  .about { background: var(--off-white); display: grid; grid-template-columns: 1fr 1fr; gap: 8rem; align-items: center; }
  .about-image { aspect-ratio: 3/4; overflow: hidden; position: relative; }
  .about-image img { width: 100%; height: 100%; object-fit: cover; object-position: center center; filter: brightness(0.9) contrast(1.05) saturate(0.85); transition: transform 0.8s; }
  .about-image:hover img { transform: scale(1.04); }
  .about-image-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(184,145,74,0.08) 0%, transparent 60%); }
  .about-image-label { position: absolute; bottom: 2rem; left: 2rem; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-light); background: rgba(26,25,23,0.5); padding: 0.3rem 0.75rem; }
  .about-text p { color: var(--ink-mid); line-height: 1.9; margin-bottom: 1.5rem; font-size: 0.95rem; }
  .line-accent { width: 60px; height: 1px; background: var(--gold-mid); margin-bottom: 2rem; }

  .services { background: var(--white); }
  .services-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5rem; }
  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border: 1px solid var(--cream-dark); }
  .service-card { padding: 3rem; border-right: 1px solid var(--cream-dark); position: relative; overflow: hidden; transition: background 0.4s; }
  .service-card:last-child { border-right: none; }
  .service-card::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 0; background: var(--off-white); transition: height 0.4s; }
  .service-card:hover::before { height: 100%; }
  .service-num { font-family: var(--serif); font-size: 4rem; font-weight: 300; color: var(--cream-dark); line-height: 1; display: block; margin-bottom: 2rem; position: relative; z-index: 1; }
  .service-card h3 { font-family: var(--serif); font-size: 1.6rem; font-weight: 300; color: var(--ink); margin-bottom: 1rem; line-height: 1.2; position: relative; z-index: 1; }
  .service-card p { font-size: 0.85rem; color: var(--ink-light); line-height: 1.8; margin-bottom: 2rem; position: relative; z-index: 1; }
  .service-link { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; transition: gap 0.3s; position: relative; z-index: 1; }
  .service-link:hover { gap: 1rem; }

  /* PORTFOLIO — clean uniform 2x2 grid */
  .portfolio { background: var(--off-white); padding: 8rem 0; }
  .portfolio-header { padding: 0 4rem; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4rem; }

  .portfolio-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto;
    gap: 4px;
    padding: 0 4rem;
  }

  .portfolio-item {
    position: relative;
    overflow: hidden;
    aspect-ratio: 4/3;
    cursor: pointer;
    background: #111;
  }

  .portfolio-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    filter: brightness(0.85) saturate(0.85) contrast(1.05);
    transition: transform 0.6s ease, filter 0.4s ease;
    display: block;
  }

  .portfolio-item:hover img {
    transform: scale(1.05);
    filter: brightness(0.55) saturate(0.7);
  }

  /* Overlay always present but text only shows on hover */
  .portfolio-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(0deg, rgba(10,9,8,0.82) 0%, rgba(10,9,8,0.1) 55%, transparent 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
